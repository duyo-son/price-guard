pre-commit:
  parallel: false
  jobs:
    - name: typecheck
      run: npm run typecheck
    - name: lint
      run: npm run lint
    - name: test
      run: npm test

commit-msg:
  jobs:
    - name: conventional-commit
      run: |
        msg=$(cat {1})
        if ! echo "$msg" | grep -qE "^(feat|fix|docs|style|refactor|test|chore|build|ci|perf)(\(.+\))?: .+"; then
          echo "❌ 커밋 메시지 형식이 올바르지 않습니다."
          echo "   형식: <type>(<scope>): <subject>"
          echo "   예시: feat(content): 쿠팡 상품 감지기 추가"
          exit 1
        fi


<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>가격파수꾼</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        width: 360px;
        min-height: 420px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 14px;
        color: #333;
        background: #f4f6fb;
      }
      .header {
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: #fff;
        padding: 16px 18px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .header h1 { font-size: 18px; font-weight: 700; }
      .toolbar {
        padding: 10px 16px;
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        border-bottom: 1px solid #e8ecf4;
        background: #fff;
      }
      .btn {
        padding: 6px 12px;
        border-radius: 7px;
        border: none;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        transition: opacity .15s;
      }
      .btn:hover { opacity: .85; }
      .btn-outline { background: #fff; border: 1px solid #d0d8ef; color: #555; }
      #product-list { padding: 10px 12px 16px; display: flex; flex-direction: column; gap: 8px; }
      .product-card {
        background: #fff;
        border-radius: 10px;
        padding: 12px 14px;
        box-shadow: 0 1px 5px rgba(0,0,0,.07);
      }
      .product-name { font-weight: 600; margin-bottom: 6px; font-size: 13px; word-break: break-all; line-height: 1.4; }
      .price-row { display: flex; gap: 16px; margin-bottom: 2px; }
      .price-item { display: flex; flex-direction: column; gap: 2px; }
      .price-label { font-size: 11px; color: #999; font-weight: 500; }
      .price-val { font-weight: 700; font-size: 15px; color: #333; }
      .price-current { color: #e53e3e; }
      .price-lowest { color: #667eea; }
      .price-graph { margin: 8px 0 4px; background: #f7f9ff; border-radius: 6px; overflow: hidden; line-height: 0; }
      .product-meta { color: #999; font-size: 11px; flex: 1; }
      .product-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; gap: 8px; }
      .btn-remove {
        padding: 4px 10px;
        background: #fff5f5;
        color: #e53e3e;
        border: 1px solid #fed7d7;
        border-radius: 6px;
        font-size: 12px;
        cursor: pointer;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: #999;
        line-height: 1.7;
      }
      .status-bar {
        text-align: center;
        font-size: 11px;
        color: #aaa;
        padding: 6px;
        border-top: 1px solid #eee;
        background: #fff;
      }
      .btn-icon {
        padding: 5px 7px;
        border-radius: 7px;
        border: 1px solid #d0d8ef;
        background: #fff;
        color: #667eea;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background .15s, color .15s;
      }
      .btn-icon:hover { background: #f0f3ff; }
      .btn-icon.active { background: linear-gradient(135deg,#667eea,#764ba2); color: #fff; border-color: transparent; }
      .settings-panel {
        overflow: hidden;
        max-height: 0;
        opacity: 0;
        padding: 0 16px;
        background: #fff;
        border-bottom: 1px solid #e8ecf4;
        transition: max-height .22s ease, opacity .22s ease, padding .22s ease;
      }
      .settings-panel.open {
        max-height: 160px;
        opacity: 1;
        padding: 14px 16px 16px;
      }
      .settings-title {
        font-size: 11px;
        font-weight: 700;
        color: #667eea;
        letter-spacing: .07em;
        text-transform: uppercase;
        margin-bottom: 10px;
      }
      .pos-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .pos-tile {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        padding: 9px 8px;
        border: 1.5px solid #e8ecf4;
        border-radius: 10px;
        background: #f8f9fc;
        cursor: pointer;
        font-size: 12px;
        font-weight: 500;
        color: #555;
        font-family: inherit;
        transition: border-color .15s, background .15s, color .15s, box-shadow .15s;
      }
      .pos-tile:hover { border-color: #667eea; background: #f0f3ff; color: #667eea; }
      .pos-tile.active {
        background: linear-gradient(135deg,#667eea,#764ba2);
        border-color: transparent;
        color: #fff;
        box-shadow: 0 3px 12px rgba(102,126,234,.35);
      }
      .pos-corner { font-size: 15px; line-height: 1; }
    </style>
  </head>
  <body>
    <div class="header">
      <span>💰</span>
      <h1>가격파수꾼</h1>
    </div>
    <div class="toolbar">
      <button class="btn btn-outline" id="btn-check-now">지금 확인</button>
      <button class="btn btn-icon" id="btn-devtools" title="테스트 모드" aria-label="테스트 모드" style="font-size:15px">🛠</button>
      <button class="btn btn-icon" id="btn-settings" title="설정" aria-label="설정">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.56-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
        </svg>
      </button>
    </div>
    <div id="settings-panel" class="settings-panel">
      <p class="settings-title">아이콘 표시 위치</p>
      <div class="pos-grid">
        <button class="pos-tile" data-pos="top-left"><span class="pos-corner">↖</span>왼쪽 위</button>
        <button class="pos-tile" data-pos="top-right"><span class="pos-corner">↗</span>오른쪽 위</button>
        <button class="pos-tile" data-pos="bottom-left"><span class="pos-corner">↙</span>왼쪽 아래</button>
        <button class="pos-tile" data-pos="bottom-right"><span class="pos-corner">↘</span>오른쪽 아래</button>
      </div>
    </div>
    <div id="product-list">
      <div class="empty-state">
        <p>추적 중인 상품이 없습니다.</p>
        <p style="font-size:12px;margin-top:6px">쇼핑몰 상품 페이지에서 추적을 시작하세요.</p>
      </div>
    </div>
    <div class="status-bar" id="status-bar">&nbsp;</div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>

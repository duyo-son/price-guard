<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Price Guard</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        width: 360px;
        min-height: 420px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 14px;
        color: #333;
        background: #f4f6fb;
      }
      .header {
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: #fff;
        padding: 16px 18px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .header h1 { font-size: 18px; font-weight: 700; }
      .toolbar {
        padding: 10px 16px;
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        border-bottom: 1px solid #e8ecf4;
        background: #fff;
      }
      .btn {
        padding: 6px 12px;
        border-radius: 7px;
        border: none;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        transition: opacity .15s;
      }
      .btn:hover { opacity: .85; }
      .btn-outline { background: #fff; border: 1px solid #d0d8ef; color: #555; }
      #product-list { padding: 10px 12px 16px; display: flex; flex-direction: column; gap: 8px; }
      .product-card {
        background: #fff;
        border-radius: 10px;
        padding: 12px 14px;
        box-shadow: 0 1px 5px rgba(0,0,0,.07);
      }
      .product-name { font-weight: 600; margin-bottom: 3px; font-size: 13px; word-break: break-all; }
      .product-price { color: #e53e3e; font-weight: 700; font-size: 15px; }
      .product-meta { color: #888; font-size: 12px; margin-top: 3px; }
      .product-footer { display: flex; justify-content: flex-end; margin-top: 8px; }
      .btn-remove {
        padding: 4px 10px;
        background: #fff5f5;
        color: #e53e3e;
        border: 1px solid #fed7d7;
        border-radius: 6px;
        font-size: 12px;
        cursor: pointer;
      }
      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: #999;
        line-height: 1.7;
      }
      .status-bar {
        text-align: center;
        font-size: 11px;
        color: #aaa;
        padding: 6px;
        border-top: 1px solid #eee;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <span>💰</span>
      <h1>Price Guard</h1>
    </div>
    <div class="toolbar">
      <button class="btn btn-outline" id="btn-check-now">지금 확인</button>
    </div>
    <div id="product-list">
      <div class="empty-state">
        <p>추적 중인 상품이 없습니다.</p>
        <p style="font-size:12px;margin-top:6px">쇼핑몰 상품 페이지에서 추적을 시작하세요.</p>
      </div>
    </div>
    <div class="status-bar" id="status-bar">&nbsp;</div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
